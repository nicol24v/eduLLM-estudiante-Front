    <circle cx="38" cy="98" r="5" fill="white" opacity="0.4"/>
    <circle cx="62" cy="106" r="3.5" fill="white" opacity="0.35"/>
    <circle cx="50" cy="88" r="3" fill="white" opacity="0.35"/>
  </g>

  <!-- Contorno -->
